apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My workflow
on:
  workflow_dispatch:
metadata:
  stages/v1alpha1:
    - name: Development
      jobs:
        - checkout-and-secret-scan
        - policy-check-secret-scan
jobs:
  checkout-and-secret-scan:
    outputs:
      policy-subject: ${{ steps.gitleaks-step.outputs.policy-subject }}
    steps:
      - with:
          provider: github
          repository: https://github.com/CBC-Git-two/auto-pe-secret-scan-repo
          ref: main
        uses: cloudbees-io/checkout@v1
        name: Checkout Component 1
      - uses: cloudbees-io/gitleaks-plugin@v1
        name: Run Gitleaks Scan
        id: gitleaks-step
      - run: |
          echo "Policy Subject: ${{ steps.gitleaks-step.outputs.policy-subject }}"
        uses: docker://alpine:3.20
        name: Print Policy Subject
  policy-check-secret-scan:
    needs:
      - checkout-and-secret-scan
    uses: cloudbees-io/policy-utils/.cloudbees/workflows/by-context.yaml@lt-test
    with:
      checkpoint-type: stage
      input-data: ${{ needs.checkout-and-secret-scan.outputs.policy-subject }}
      checkpoint-position: within
      checkpoint-name: Development
