apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My workflow
on:
  workflow_dispatch:
metadata:
  stages/v1alpha1:
    - name: Development
      jobs:
        - checkout-and-secret-scan
jobs:
  checkout-and-secret-scan:
    steps:
      - with:
          provider: github
          repository: https://github.com/CBC-Git-two/auto-pe-secret-scan-repo
          ref: main
        uses: cloudbees-io/checkout@v1
        name: Checkout Component 1
      - uses: cloudbees-io/gitleaks-plugin@v1
        name: Run Gitleaks Scan
        id: gitleaks-step
      - run: |
          echo "Policy Subject: ${{ steps.gitleaks-step.outputs.policy-subject }}"
        uses: docker://alpine:3.20
        name: Print Policy Subject
