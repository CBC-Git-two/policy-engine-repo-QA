apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: auto-container-scan-staged-workflow
on:
  workflow_dispatch:
metadata:
  stages/v1alpha1:
    - name: Development
      jobs:
        - checkout-and-sast-scan
        - policy-check-release-readiness
    - name: QA
      jobs:
        - policy-check
jobs:
  checkout-and-sast-scan:
    outputs:
      policy-subject: ${{ steps.trivy-scan.outputs.policy-subject }}
    steps:
      - with:
          provider: github
          repository: https://github.com/CBC-Git-two/auto-pe-container-scan-repo
          ref: main
        uses: cloudbees-io/checkout@v1
        name: Checkout Component 1
      - with:
          snyk-token: b805f82c-36ef-4f7d-aee5-16bfaa718f75
          org-id: cloudbees-compliance-partner-development
        uses: cloudbees-io/snyk-sast-plugin@v1
        name: Run Snyk Sast Scan
        id: snyk-sast-scan
      - name: Print Policy Subject
        uses: docker://alpine:3.20
        run: |
          echo "Policy Subject: ${{ steps.snyk-sast-scan.outputs.policy-subject }}"
      - with:
          binary-tar-path: /cloudbees/workspace/golang-alpine.tar
        uses: cloudbees-io/trivy-plugin@v1
        name: trivy-scan
        id: trivy-scan
      - run: |
          echo "Policy Subject: ${{ steps.trivy-scan.outputs.policy-subject }}"
        uses: docker://alpine:3.20
        name: Print Trivy Policy Subject
  policy-check-release-readiness:
    needs: checkout-and-sast-scan
    uses: cloudbees-io/policy-utils/.cloudbees/workflows/by-context.yaml@lt-test
    with:
      checkpoint-type: stage
      input-data: ${{ needs.checkout-and-sast-scan.outputs.policy-subject }}
      checkpoint-position: within
      checkpoint-name: Development
  policy-check:
    needs:
      - checkout-and-sast-scan
      - policy-check-release-readiness
    uses: cloudbees-io/policy-utils/.cloudbees/workflows/by-context.yaml@lt-test
    with:
      checkpoint-type: stage
      input-data: ${{ needs.checkout-and-sast-scan.outputs.policy-subject }}
      checkpoint-position: within
      checkpoint-name: QA
